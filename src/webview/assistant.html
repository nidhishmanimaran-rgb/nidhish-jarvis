<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jarvis Assistant</title>
    <link rel="stylesheet" href="assistant.css" />
  </head>
  <body>
    <div class="app-shell" id="app-shell">
      <header class="topbar">
        <div class="brand-group">
          <button class="icon-button" id="sidebar-toggle" type="button" aria-label="Toggle sidebar" title="Toggle sidebar">
            &#9776;
          </button>
          <div class="brand-mark" aria-hidden="true">&#129302;</div>
          <div class="brand-copy">
            <h1>Jarvis Assistant</h1>
            <div class="status-line" id="status" aria-live="polite">Ready</div>
          </div>
        </div>

        <div class="topbar-actions" aria-label="Assistant actions">
          <label class="model-picker">
            <span class="sr-only">Current model</span>
            <select id="model-select" aria-label="Current model">
              <option value="qwen2.5-coder:3b">qwen2.5-coder:3b</option>
              <option value="qwen2.5-coder:latest">qwen2.5-coder:latest</option>
              <option value="llama3.2:3b">llama3.2:3b</option>
              <option value="mistral:7b">mistral:7b</option>
              <option value="deepseek-r1:8b">deepseek-r1:8b</option>
            </select>
          </label>
          <button class="toolbar-button" id="new-chat" type="button">New Chat</button>
          <button class="toolbar-button" id="export-chat" type="button">Export</button>
          <button class="toolbar-button" id="settings-toggle" type="button" aria-haspopup="dialog" aria-expanded="false">Settings</button>
        </div>
      </header>

      <div class="workspace">
        <aside class="sidebar" id="sidebar" aria-label="Conversations">
          <button class="primary-sidebar-action" id="sidebar-new-chat" type="button">New Chat</button>

          <label class="search-box">
            <span class="sr-only">Search conversations</span>
            <input id="conversation-search" type="search" placeholder="Search conversations" autocomplete="off" />
          </label>

          <nav class="sidebar-tabs" aria-label="Conversation sections">
            <button class="sidebar-tab is-active" type="button" data-section="history">Conversation History</button>
            <button class="sidebar-tab" type="button" data-section="saved">Saved Chats</button>
            <button class="sidebar-tab" type="button" data-section="recent">Recent Sessions</button>
          </nav>

          <div class="session-list" id="session-list" aria-live="polite"></div>
        </aside>

        <main class="chat-column" aria-label="Chat with Jarvis">
          <section class="model-alert" id="model-alert" hidden>
            <div id="model-alert-text"></div>
            <button class="toolbar-button" id="model-alert-action" type="button">Start Ollama</button>
          </section>

          <section class="messages" id="messages" aria-live="polite" aria-relevant="additions text"></section>

          <section class="welcome-state" id="welcome-state">
            <div class="welcome-badge" aria-hidden="true">&#128075;</div>
            <h2>Welcome to Jarvis</h2>
            <p>Ask for help with code, architecture, debugging, writing, or workspace planning.</p>
            <div class="example-grid" aria-label="Example prompts">
              <button class="example-prompt" type="button">Explain this C# error</button>
              <button class="example-prompt" type="button">Generate a .NET API</button>
              <button class="example-prompt" type="button">Review my SQL query</button>
              <button class="example-prompt" type="button">Create an ASP.NET Core controller</button>
              <button class="example-prompt" type="button">Fix my Flutter code</button>
            </div>
          </section>

          <footer class="composer-shell" aria-label="Message composer">
            <div class="attachment-tray" id="attachment-tray" hidden></div>
            <div class="composer">
              <div class="composer-leading">
                <button class="icon-button" id="quick-add" type="button" aria-label="New chat" title="New chat">+</button>
                <button class="icon-button" id="attach-file" type="button" aria-label="Attach files" title="Attach files">&#128206;</button>
                <input id="file-input" type="file" multiple hidden />
              </div>

              <label class="composer-input-wrap">
                <span class="sr-only">Type your message</span>
                <textarea id="input" rows="1" placeholder="Type your message..." autocomplete="off"></textarea>
              </label>

              <div class="composer-actions">
                <button class="voice-button" id="voice-input" type="button" aria-label="Voice input">&#127908; Voice</button>
                <button class="send-button" id="send" type="button">Send</button>
              </div>
            </div>
          </footer>
        </main>
      </div>

      <aside class="settings-panel" id="settings-panel" role="dialog" aria-modal="false" aria-labelledby="settings-title" hidden>
        <div class="settings-header">
          <div>
            <h2 id="settings-title">Settings</h2>
            <p>Fine-tune Jarvis for this chat.</p>
          </div>
          <button class="icon-button" id="settings-close" type="button" aria-label="Close settings">x</button>
        </div>

        <div class="settings-grid">
          <label>
            <span>Theme</span>
            <select id="setting-theme">
              <option value="system">System</option>
              <option value="dark">Dark</option>
              <option value="light">Light</option>
            </select>
          </label>

          <label>
            <span>Preferred Model</span>
            <select id="setting-model">
              <option value="qwen2.5-coder:3b">qwen2.5-coder:3b</option>
              <option value="qwen2.5-coder:latest">qwen2.5-coder:latest</option>
              <option value="llama3.2:3b">llama3.2:3b</option>
              <option value="mistral:7b">mistral:7b</option>
              <option value="deepseek-r1:8b">deepseek-r1:8b</option>
            </select>
          </label>

          <label>
            <span>Temperature <output id="temperature-value">0.7</output></span>
            <input id="setting-temperature" type="range" min="0" max="2" step="0.1" value="0.7" />
          </label>

          <label>
            <span>Max Tokens</span>
            <input id="setting-max-tokens" type="number" min="1" max="8192" value="512" />
          </label>

          <label class="toggle-row">
            <span>Streaming</span>
            <input id="setting-streaming" type="checkbox" checked />
          </label>

          <label class="toggle-row">
            <span>Auto Scroll</span>
            <input id="setting-auto-scroll" type="checkbox" checked />
          </label>

          <label>
            <span>Font Size <output id="font-size-value">13px</output></span>
            <input id="setting-font-size" type="range" min="12" max="18" step="1" value="13" />
          </label>
        </div>
      </aside>
    </div>
    <script src="./assistant.js"></script>
  </body>
</html>
