<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jarvis</title>
    <style>
      body { font-family: sans-serif; margin: 0; padding: 0; background: var(--vscode-editor-background); color: var(--vscode-editor-foreground); }
      .shell { display: flex; flex-direction: column; height: 100vh; }
      .header { padding: 12px 16px; border-bottom: 1px solid var(--vscode-panel-border); font-weight: 600; }
      #messages { flex: 1; padding: 12px; overflow: auto; display: flex; flex-direction: column; gap: 8px; }
      .message { padding: 8px 10px; border-radius: 8px; max-width: 90%; }
      .message.user { align-self: flex-end; background: var(--vscode-button-background); color: var(--vscode-button-foreground); }
      .message.assistant { align-self: flex-start; background: var(--vscode-inputOption-activeBackground); }
      .composer { display: flex; gap: 8px; padding: 12px; border-top: 1px solid var(--vscode-panel-border); }
      #input { flex: 1; padding: 8px; border: 1px solid var(--vscode-input-border); background: var(--vscode-input-background); color: var(--vscode-input-foreground); }
      button { padding: 8px 10px; background: var(--vscode-button-background); color: var(--vscode-button-foreground); border: none; border-radius: 4px; }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="header">Jarvis Foundation Panel</div>
      <div id="messages"></div>
      <div class="composer">
        <input id="input" placeholder="Ask Jarvis something..." />
        <button id="send">Send</button>
      </div>
    </div>
    <script src="./main.js"></script>
  </body>
</html>
